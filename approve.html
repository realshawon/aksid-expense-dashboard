<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AKSID Expense — Approve</title>
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<style>
:root{color-scheme:light}*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',system-ui,Arial,sans-serif;background:#f4f6f9;color:#1d1d1f;font-size:14px}
.wrap{max-width:560px;margin:0 auto;padding:20px}
.logo{height:40px;margin-bottom:14px}
.card{background:#fff;border:1px solid #e6e8ec;border-radius:14px;padding:20px}
h1{font-size:18px;margin:0 0 2px}.sub{color:#6b6b70;font-size:12.5px;margin:0 0 16px}
table{width:100%;border-collapse:collapse;font-size:13.5px;margin-bottom:8px}
td{padding:7px 0;border-bottom:1px solid #f0f2f5}td.k{color:#6b6b70;width:38%}td.v{font-weight:600}
.stage{display:inline-block;font-size:12px;font-weight:700;color:#1c52c0;background:#e7efff;padding:3px 10px;border-radius:20px}
.amt{display:flex;align-items:center;gap:10px;margin:16px 0}
.amt input{font:inherit;font-size:16px;font-weight:700;padding:8px 12px;border:1px solid #d6dae1;border-radius:9px;width:160px}
.btns{display:flex;gap:10px;margin-top:18px}
button{font:inherit;font-weight:700;border:none;border-radius:10px;padding:12px 18px;cursor:pointer;flex:1}
.ap{background:#2e9d4f;color:#fff}.rj{background:#fff;color:#d23b46;border:1px solid #f0c2c5}
.msg{margin-top:16px;padding:12px 14px;border-radius:10px;font-size:13.5px;display:none}
.msg.ok{background:#e6f4ea;color:#226b39;display:block}.msg.err{background:#fdeced;color:#a3242e;display:block}
.muted{color:#9a9aa0;font-size:11.5px;margin-top:14px}.save{font-weight:700;color:#1d1d1f}
a{color:#2a6df4;text-decoration:none}
</style>
</head>
<body>
<div class="wrap">
  <img class="logo" src="https://images.squarespace-cdn.com/content/v1/61b1d88771230e2244b14213/de522f80-4556-42c4-af20-e3687e746991/AKSID-HORIZONTAL-LOGO.png?format=750w" alt="AKSID">
  <div class="card" id="card"><div class="sub">Loading expense…</div></div>
</div>
<script>
const q=new URLSearchParams(location.search);
const id=q.get('id');
const role=q.get('role')||'approver';
let exp=null;

function money(n){return '৳'+Math.round(Number(n||0)).toLocaleString('en-US');}
function stageLabel(s){return s==='Manager'?'Reporting':s;}
function receiptsRow(exp){
  let list=Array.isArray(exp.receipts)?exp.receipts:[];
  if(!list.length&&exp.receipt_url)list=[{name:'Receipt',url:exp.receipt_url}];
  if(!list.length)return '';
  const links=list.map((r,i)=>`<a href="${r.url}" target="_blank">Open ${r.name||('Receipt '+(i+1))} ↗</a>`).join('<br>');
  return `<tr><td class="k">Receipts</td><td class="v">${links}</td></tr>`;
}
function trailRows(exp){
  const h=Array.isArray(exp.history)?exp.history:[];
  const appr=h.filter(x=>x.action==='approved');
  const items=appr.map(x=>`<div style="font-size:13px;margin:3px 0">✓ <b>${stageLabel(x.stage)}</b> ${money(x.amount)}${(x.by&&String(x.by).includes('@'))?` <span style="color:#9a9aa0">· ${x.by}</span>`:''}${x.sealed?` <span style="display:inline-block;background:#0e7490;color:#fff;font-size:10px;font-weight:700;padding:1px 7px;border-radius:4px">✔ AUDIT SEAL</span>`:''}${x.comment?` <span style="color:#6b6b70">— “${x.comment}”</span>`:''}</div>`).join('');
  const waiting=(exp.stage==='Posted'||exp.stage==='Rejected')?'':`<div style="font-size:13px;margin:6px 0 0;color:#1c52c0;font-weight:600">⏳ Waiting for approval: ${stageLabel(exp.stage)}</div>`;
  if(!items && !waiting) return '';
  return `<div style="margin:6px 0 14px"><div style="font-size:11px;color:#6b6b70;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin:0 0 4px">Approval status</div>${items}${waiting}</div>`;
}

async function loadExp(){
  if(!id){document.getElementById('card').innerHTML='<div class="sub">No expense id in the link.</div>';return;}
  const r=await fetch('/api?action=get&id='+encodeURIComponent(id),{cache:'no-store'});
  const d=await r.json();
  if(!d.ok){document.getElementById('card').innerHTML='<div class="sub">'+(d.error||'Not found')+'</div>';return;}
  exp=d.expense;exp.__stages=d.stages;render();
}
function render(){
  const cur=(exp.edited_amount!=null?exp.edited_amount:exp.amount);
  const stages=exp.__stages||['Manager','Audit','Accounts','Top Mgmt'];
  const roleIdx=stages.indexOf(role), curIdx=stages.indexOf(exp.stage);
  let actionHtml;
  if(exp.stage==='Rejected'){
    actionHtml=`<div class="msg err">❌ This expense was <b>rejected</b>. No action needed.</div>`;
  }else if(exp.stage==='Posted'){
    actionHtml=`<div class="msg ok">✅ Fully approved and <b>posted to Zoho Books</b>. No action needed.</div>`;
  }else if(roleIdx!==-1&&curIdx!==-1&&roleIdx<curIdx){
    actionHtml=`<div class="msg ok">✅ You have already approved this as <b>${stageLabel(role)}</b>. It has moved on and is now with <b>${stageLabel(exp.stage)}</b>.</div>`;
  }else if(roleIdx!==-1&&curIdx!==-1&&roleIdx>curIdx){
    actionHtml=`<div class="msg ok">⏳ This hasn't reached your stage yet — it's currently with <b>${stageLabel(exp.stage)}</b>. You'll get an email when it's your turn.</div>`;
  }else{
    actionHtml=`
      <div class="amt"><span class="k" style="color:#6b6b70">Approved amount</span><input id="ed" type="number" step="0.01" value="${cur}"></div>
      <label style="display:block;font-size:12px;color:#6b6b70;font-weight:600;margin:4px 0 4px">Comment (optional)</label>
      <textarea id="cm" placeholder="Add a note${role==='Top Mgmt'?' — shown in the final summary email':''}" style="width:100%;font:inherit;padding:9px 11px;border:1px solid #d6dae1;border-radius:9px;min-height:54px;resize:vertical"></textarea>
      ${role==='Audit'?`<label style="display:flex;align-items:center;gap:8px;margin:10px 0 2px;font-size:13px;color:#1d1d1f;font-weight:600"><input type="checkbox" id="seal" style="width:auto;margin:0"> 🔖 Apply Audit Seal (verified by Audit)</label>`:''}
      <div class="btns"><button class="ap" onclick="act('approve')">Approve</button><button class="rj" onclick="act('reject')">Reject</button></div>`;
  }
  document.getElementById('card').innerHTML=`
    <h1>Expense ${exp.ref||('#'+exp.id)}</h1>
    <p class="sub">Stage: <span class="stage">${stageLabel(exp.stage)}</span></p>
    <table>
      <tr><td class="k">Employee</td><td class="v">${exp.employee_name||'—'} ${exp.employee_id?('· ID '+exp.employee_id):''}</td></tr>
      <tr><td class="k">Cost Center</td><td class="v">${exp.cost_center||'—'}</td></tr>
      <tr><td class="k">Date</td><td class="v">${exp.expense_date?String(exp.expense_date).slice(0,10):'—'}</td></tr>
      <tr><td class="k">Category</td><td class="v">${exp.category||'—'}</td></tr>
      <tr><td class="k">Vendor</td><td class="v">${exp.vendor||'—'}</td></tr>
      <tr><td class="k">Description</td><td class="v">${exp.description||'—'}</td></tr>
      <tr><td class="k">Original amount</td><td class="v">${money(exp.amount)}</td></tr>
      ${receiptsRow(exp)}
    </table>
    ${trailRows(exp)}
    ${actionHtml}
    <div class="msg" id="msg"></div>
    <p class="muted">Approving advances to the next stage. The final approval posts the expense to Zoho Books automatically. <span class="save">DO NOT PRINT — SAVE PAPER.</span></p>`;
}
async function act(a){
  const m=document.getElementById('msg');m.className='msg';m.textContent='Working…';m.style.display='block';
  const ed=document.getElementById('ed');
  const cm=document.getElementById('cm');
  const seal=document.getElementById('seal');
  const body={action:a,id:exp.id,by:role,editedAmount:ed?ed.value:undefined,comment:cm?cm.value:undefined,auditSeal:seal?seal.checked:undefined};
  if(a==='reject'){body.reason=prompt('Reason for rejection (optional):')||'';}
  try{
    const r=await fetch('/api',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const d=await r.json();
    if(!d.ok){m.className='msg err';m.textContent=d.error||'Failed';return;}
    exp=d.expense;
    m.className='msg ok';
    m.innerHTML=(a==='approve'? (exp.stage==='Posted'?'✅ Final approval done — posted to Zoho Books.':'✅ Approved. Now with: <b>'+exp.stage+'</b>.') : '↩️ Rejected.');
    setTimeout(render,1500);
  }catch(e){m.className='msg err';m.textContent=String(e);}
}
loadExp();
</script>
</body>
</html>
