<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AKSID Expense — Payment</title>
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<style>
:root{color-scheme:light}*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',system-ui,Arial,sans-serif;background:#f4f6f9;color:#1d1d1f;font-size:14px}
.wrap{max-width:560px;margin:0 auto;padding:20px}
.logo{height:40px;margin-bottom:14px}
.card{background:#fff;border:1px solid #e6e8ec;border-radius:14px;padding:20px}
h1{font-size:18px;margin:0 0 2px}.sub{color:#6b6b70;font-size:12.5px;margin:0 0 16px}
table{width:100%;border-collapse:collapse;font-size:13.5px;margin-bottom:8px}
td{padding:7px 0;border-bottom:1px solid #f0f2f5}td.k{color:#6b6b70;width:40%}td.v{font-weight:600}
.pill{display:inline-block;font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px}
.pill.posted{color:#1c52c0;background:#e7efff}.pill.paid{color:#8a5a00;background:#fff3d6}.pill.closed{color:#226b39;background:#e6f4ea}.pill.issue{color:#a3242e;background:#fdeced}
label{display:block;font-size:12px;color:#6b6b70;font-weight:600;margin:12px 0 4px}
input,select,textarea{width:100%;font:inherit;padding:9px 11px;border:1px solid #d6dae1;border-radius:9px;background:#fff}
.btns{display:flex;gap:10px;margin-top:18px}
button{font:inherit;font-weight:700;border:none;border-radius:10px;padding:12px 18px;cursor:pointer;flex:1}
.ap{background:#16a34a;color:#fff}.pay{background:#2a6df4;color:#fff}.rj{background:#fff;color:#d23b46;border:1px solid #f0c2c5}
.msg{margin-top:16px;padding:12px 14px;border-radius:10px;font-size:13.5px;display:none}
.msg.ok{background:#e6f4ea;color:#226b39;display:block}.msg.err{background:#fdeced;color:#a3242e;display:block}
.muted{color:#9a9aa0;font-size:11.5px;margin-top:14px}.save{font-weight:700;color:#1d1d1f}
</style>
</head>
<body>
<div class="wrap">
  <img class="logo" src="https://images.squarespace-cdn.com/content/v1/61b1d88771230e2244b14213/de522f80-4556-42c4-af20-e3687e746991/AKSID-HORIZONTAL-LOGO.png?format=750w" alt="AKSID">
  <div class="card" id="card"><div class="sub">Loading…</div></div>
</div>
<script>
const q=new URLSearchParams(location.search);
const id=q.get('id');
const role=q.get('role')||'';
let exp=null;
function money(n){return '৳'+Math.round(Number(n||0)).toLocaleString('en-US');}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function statusPill(s){
  const m={posted:'Posted · awaiting payment',paid:'Paid · awaiting receipt confirmation',closed:'Closed · receipt confirmed',issue:'⚠ Not received — reported'};
  const cls=s||'posted';return '<span class="pill '+cls+'">'+(m[s]|| 'Posted · awaiting payment')+'</span>';
}
function detailRows(e){
  return `<tr><td class="k">Employee</td><td class="v">${esc(e.employee_name)||'—'}${e.employee_id?(' · ID '+esc(e.employee_id)):''}</td></tr>
    <tr><td class="k">Cost Center</td><td class="v">${esc(e.cost_center)||'—'}</td></tr>
    <tr><td class="k">Category</td><td class="v">${esc(e.category)||'—'}</td></tr>
    <tr><td class="k">Vendor</td><td class="v">${esc(e.vendor)||'—'}</td></tr>
    <tr><td class="k">Amount</td><td class="v">${money(e.edited_amount!=null?e.edited_amount:e.amount)}</td></tr>`;
}
function payRows(e){
  if(!e.payment_method && e.settlement_status!=='paid' && e.settlement_status!=='closed' && e.settlement_status!=='issue') return '';
  return `<tr><td class="k">Payment method</td><td class="v">${esc(e.payment_method)||'—'}</td></tr>
    <tr><td class="k">Reference</td><td class="v">${esc(e.payment_ref)||'—'}</td></tr>
    <tr><td class="k">Payment date</td><td class="v">${e.payment_date?String(e.payment_date).slice(0,10):'—'}</td></tr>`;
}
async function load(){
  if(!id){document.getElementById('card').innerHTML='<div class="sub">No expense id in the link.</div>';return;}
  const r=await fetch('/api?action=get&id='+encodeURIComponent(id),{cache:'no-store'});
  const d=await r.json();
  if(!d.ok){document.getElementById('card').innerHTML='<div class="sub">'+(d.error||'Not found')+'</div>';return;}
  exp=d.expense;render();
}
function render(){
  const e=exp;const st=e.settlement_status||(e.stage==='Posted'?'posted':null);
  let action='';
  const notPosted = e.stage!=='Posted';
  if(notPosted){
    action=`<div class="msg err" style="display:block">This expense isn't fully approved &amp; posted yet (currently <b>${esc(e.stage)}</b>). Payment can be recorded only after it reaches Zoho.</div>`;
  } else if(role==='Accounts'){
    if(e.settlement_status==='paid'||e.settlement_status==='closed'){
      action=`<div class="msg ok" style="display:block">✅ Already recorded as <b>paid</b>${e.settlement_status==='closed'?' and the submitter has confirmed receipt (closed)':' — waiting for the submitter to confirm receipt'}.</div>`;
    } else {
      const today=new Date().toISOString().slice(0,10);
      action=`<label>Payment method</label>
        <select id="method"><option value="">Select…</option><option>Bank transfer</option><option>Cash</option><option>bKash</option><option>Nagad</option><option>Cheque</option><option>Other</option></select>
        <label>Reference / transaction no.</label><input id="ref" placeholder="e.g. TXN123456 / cheque no.">
        <label>Payment date</label><input id="pdate" type="date" value="${today}">
        <div class="btns"><button class="pay" onclick="pay()">💸 Confirm payment recorded</button></div>`;
    }
  } else { // submitter
    if(e.settlement_status==='closed'){
      action=`<div class="msg ok" style="display:block">✅ You already confirmed receipt. This reimbursement is <b>closed</b>. Thank you.</div>`;
    } else if(e.settlement_status==='paid'||e.settlement_status==='issue'){
      action=`<p style="font-size:13px;color:#6b6b70;margin:14px 0 4px">Did you receive this reimbursement?</p>
        <div class="btns"><button class="ap" onclick="confirmReceipt()">✅ Yes, I received it</button><button class="rj" onclick="notReceived()">No, not received</button></div>`;
      if(e.settlement_status==='issue') action=`<div class="msg err" style="display:block">You reported this as not received. Accounts has been notified.</div>`+action;
    } else {
      action=`<div class="msg ok" style="display:block">This has been approved and posted, but Accounts hasn't recorded the payment yet. You'll get an email to confirm once it's paid.</div>`;
    }
  }
  document.getElementById('card').innerHTML=`
    <h1>Expense ${esc(e.ref)||('#'+e.id)}</h1>
    <p class="sub">Status: ${statusPill(st)}</p>
    <table>${detailRows(e)}${payRows(e)}</table>
    ${action}
    <div class="msg" id="msg"></div>
    <p class="muted">Payment settlement · Accounts records the payment, the submitter confirms receipt. <span class="save">DO NOT PRINT — SAVE PAPER.</span></p>`;
}
async function post(body){
  const m=document.getElementById('msg');m.className='msg';m.textContent='Working…';m.style.display='block';
  try{
    const r=await fetch('/api',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const d=await r.json();
    if(!d.ok){m.className='msg err';m.textContent=d.error||'Failed';return null;}
    exp=d.expense;return d;
  }catch(err){m.className='msg err';m.textContent=String(err);return null;}
}
async function pay(){
  const method=document.getElementById('method').value;
  const ref=document.getElementById('ref').value;
  const date=document.getElementById('pdate').value;
  if(!method){const m=document.getElementById('msg');m.className='msg err';m.textContent='Please choose a payment method.';return;}
  const d=await post({action:'pay',id:exp.id,method,ref,date,by:'Accounts'});
  if(d){const m=document.getElementById('msg');m.className='msg ok';m.innerHTML='✅ Payment recorded. The submitter has been asked to confirm receipt.';setTimeout(render,1400);}
}
async function confirmReceipt(){
  const d=await post({action:'confirmReceipt',id:exp.id});
  if(d){const m=document.getElementById('msg');m.className='msg ok';m.innerHTML='✅ Thank you — receipt confirmed. This reimbursement is now closed.';setTimeout(render,1400);}
}
async function notReceived(){
  const note=prompt('Optional: add a note for Accounts (e.g. wrong account, amount short):')||'';
  const d=await post({action:'reportNotReceived',id:exp.id,note});
  if(d){const m=document.getElementById('msg');m.className='msg err';m.innerHTML='⚠️ Reported. Accounts has been notified to follow up.';setTimeout(render,1400);}
}
load();
</script>
</body>
</html>
